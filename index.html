<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Premium</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div id="cadastro">
        <h1>🔒 Criar Senha</h1>

        <p>Cadastre uma senha para acessar a calculadora.</p>

        <input
            type="password"
            id="senhaCriada"
            placeholder="Digite uma senha">

        <button class="btn" onclick="salvarSenha()">
            Salvar Senha
        </button>
    </div>

    <div id="login">

        <h1>🔑 Login</h1>

        <p>Digite sua senha para entrar.</p>

        <input
            type="password"
            id="senhaDigitada"
            placeholder="Digite sua senha">

        <button class="btn" onclick="entrar()">
            Entrar
        </button>

    </div>

    <div id="calculadora">

        <h1>🧮 Calculadora</h1>

        <input
            type="text"
            id="resultado"
            readonly>

        <div class="botoes">

           
            <button class="numero" onclick="add('')">7</button>

            <button class="numero" onclick="add('8')">8</button>
            <button class="numero" onclick="add('9')">9</button>
            <button class="operador" onclick="add('/')">÷</button>

            <button class="numero" onclick="add('4')">4</button>
            <button class="numero" onclick="add('5')">5</button>
            <button class="numero" onclick="add('6')">6</button>
            <button class="operador" onclick="add('*')">×</button>

            <button class="numero" onclick="add('1')">1</button>
            <button class="numero" onclick="add('2')">2</button>
            <button class="numero" onclick="add('3')">3</button>
            <button class="operador" onclick="add('-')">−</button>

            <button class="numero" onclick="add('0')">0</button>
            <button class="numero" onclick="add('.')">.</button>
            <button class="igual" onclick="calcular()">=</button>
            <button class="operador" onclick="add('+')">+</button>

            <button
                class="ac"
                style="grid-column: span 4;"
                onclick="limpar()">
                AC
            </button>

        </div>

    </div>

</div>

<script src="javasj.js"></script>

</body>
</html>
